<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .card {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Warm radial glow at top */
  .glow {
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 500px;
    background: radial-gradient(ellipse at center,
      rgba(255, 140, 50, 0.15) 0%,
      rgba(200, 80, 30, 0.08) 30%,
      rgba(150, 50, 20, 0.03) 50%,
      transparent 70%);
    pointer-events: none;
  }

  /* Secondary glow */
  .glow2 {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 350px;
    background: radial-gradient(ellipse at center,
      rgba(255, 165, 70, 0.12) 0%,
      transparent 60%);
    pointer-events: none;
  }

  /* Version badge */
  .badge {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 24px;
    background: rgba(255,255,255,0.03);
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
  }

  /* Title with gradient */
  .title {
    position: relative;
    z-index: 1;
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #ff8c32, #ff6b6b, #e855a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    font-family: 'Inter', sans-serif;
  }

  /* Tagline */
  .tagline {
    position: relative;
    z-index: 1;
    font-size: 24px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  /* Description */
  .description {
    position: relative;
    z-index: 1;
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    max-width: 500px;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 40px;
  }

  /* Feature pills */
  .features {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 12px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }

  .feature-icon {
    font-size: 14px;
    opacity: 0.7;
  }

  .feature.active {
    background: rgba(59, 130, 246, 0.15);
    border-color: rgba(59, 130, 246, 0.3);
    color: rgba(147, 197, 253, 0.9);
  }

  /* URL watermark */
  .url {
    position: absolute;
    bottom: 24px;
    right: 32px;
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    z-index: 1;
  }

  /* macOS badge */
  .macos {
    position: absolute;
    bottom: 24px;
    left: 32px;
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 5px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="badge">
    <div class="badge-dot"></div>
    v1.3.0 · macOS 14+ · Zero dependencies
  </div>

  <div class="title">Clip</div>

  <div class="tagline">Your Mac's sidekick for content creation.</div>

  <div class="description">
    Menu bar app + CLI that manages assets, transforms Markdown, and formats text for social media.
  </div>

  <div class="features">
    <div class="feature active">
      <span class="feature-icon">🗂</span> Assets
    </div>
    <div class="feature">
      <span class="feature-icon">⇄</span> Transform
    </div>
    <div class="feature">
      <span class="feature-icon">Aa</span> Format
    </div>
    <div class="feature">
      <span class="feature-icon">📄</span> Snippets
    </div>
  </div>

  <div class="macos">⌘ macOS menu bar utility</div>
  <div class="url">clip.cc4.marketing</div>
</div>
</body>
</html>
